version: "2"

run:
  timeout: 5m

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - gochecknoinits
    - nonamedreturns
    - wsl
    - lll
    - ireturn
    - testpackage
  settings:
    funlen:
      lines: 60
      statements: 60
    gocyclo:
      min-complexity: 15
    cyclop:
      max-complexity: 15
    tagliatelle:
      case:
        use-field-name: true
        extended-rules:
          json:
            case: camel
            extra-initialisms: true
            initialism-overrides:
              ID: true
              URL: true
              CPU: true
              API: true
              UUID: true
              UID: true
    wrapcheck:
      extra-ignore-sigs:
        - .Err()
        - .Mark(
        - .RoundTrip(
    varnamelen:
      max-distance: 5
      min-name-length: 3
      check-receiver: false
      check-return: false
      ignore-type-assert-ok: false
      ignore-map-index-ok: false
      ignore-chan-recv-ok: false
      ignore-decls:
        - wg sync.WaitGroup
        - wg *sync.WaitGroup
        - mu sync.Mutex
        - ok bool
      ignore-names:
        - err
        - ctx
        - id
        - ok
        - i
        - t
        - b
        - v
        - w
        - r
        - c
        - m
        - n
        - tt
        - rw
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocyclo
          - cyclop
          - dupl
          - gosec
          - noinlineerr
          - paralleltest
      - path: _test\.go
        text: "dot-imports"
        linters:
          - revive
      - path: cmd/claudeline/main\.go
        linters:
          - gochecknoglobals
          - forbidigo
      - path: internal/
        linters:
          - gochecknoglobals
      - path: internal/usage/types\.go
        linters:
          - tagliatelle
      - path: cmd/claudeline/main\.go
        text: "tagliatelle"
        linters:
          - tagliatelle

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
